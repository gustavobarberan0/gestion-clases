<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MisClases – Acceder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0F0F13; --bg2:#16161C; --bg3:#1E1E26;
      --border:#2A2A36; --text:#E8E8F0; --text2:#9090A8;
      --accent:#7C6FFF; --danger:#FF6B6B; --success:#4ECDC4;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px}
    .logo{display:flex;align-items:center;gap:.6rem;margin-bottom:2rem;justify-content:center}
    .logo-mark{color:var(--accent);font-size:1.4rem}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem}
    .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem}
    .tab{flex:1;padding:.7rem;background:none;border:none;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.95rem;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .form{display:flex;flex-direction:column;gap:1rem}
    .form-group{display:flex;flex-direction:column;gap:.35rem}
    label{font-size:.8rem;color:var(--text2);font-weight:500}
    input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.7rem .9rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.92rem;transition:border-color .2s;outline:none}
    input:focus{border-color:var(--accent)}
    .btn{width:100%;padding:.8rem;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;margin-top:.4rem}
    .btn-primary{background:var(--accent);color:white}
    .btn-primary:hover{opacity:.85}
    .error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:var(--danger);padding:.7rem .9rem;border-radius:8px;font-size:.85rem;display:none}
    .error.show{display:block}
    .hint{font-size:.78rem;color:var(--text2);text-align:center;margin-top:.8rem;line-height:1.5}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin-right:.4rem;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="logo-mark">◆</span><span class="logo-text">MisClases</span></div>
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Ingresar</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login">
      <div class="form">
        <div class="error" id="loginError"></div>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Contraseña</label><input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password"></div>
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Ingresar</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" style="display:none">
      <div class="form">
        <div class="error" id="registerError"></div>
        <div class="form-group"><label>Nombre completo</label><input type="text" id="regNombre" placeholder="Prof. Juan García" autocomplete="name"></div>
        <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="tu@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Contraseña <span style="color:var(--text2)">(mín. 6 caracteres)</span></label><input type="password" id="regPassword" placeholder="••••••" autocomplete="new-password"></div>
        <button class="btn btn-primary" id="registerBtn" onclick="doRegister()">Crear cuenta</button>
        <p class="hint">El primer usuario registrado<br>se convierte en administrador.</p>
      </div>
    </div>
  </div>

  <script>
    function showTab(t) {
      document.getElementById('tab-login').style.display = t === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').style.display = t === 'register' ? 'block' : 'none';
      document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>Cargando...' : (btnId === 'loginBtn' ? 'Ingresar' : 'Crear cuenta');
    }

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg; el.classList.add('show');
    }

    function hideError(id) { document.getElementById(id).classList.remove('show'); }

    async function doLogin() {
      hideError('loginError');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!email || !password) return showError('loginError', 'Completa todos los campos');
      setLoading('loginBtn', true);
      try {
        const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({email, password}) });
        const data = await res.json();
        if (!res.ok) { showError('loginError', data.error); setLoading('loginBtn', false); return; }
        window.location.replace('/');
      } catch(e) { showError('loginError', 'Error de conexión'); setLoading('loginBtn', false); }
    }

    async function doRegister() {
      hideError('registerError');
      const nombre = document.getElementById('regNombre').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      if (!nombre || !email || !password) return showError('registerError', 'Completa todos los campos');
      setLoading('registerBtn', true);
      try {
        const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({nombre, email, password}) });
        const data = await res.json();
        if (!res.ok) { showError('registerError', data.error); setLoading('registerBtn', false); return; }
        window.location.replace('/');
      } catch(e) { showError('registerError', 'Error de conexión'); setLoading('registerBtn', false); }
    }

    // Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('tab-login').style.display !== 'none') doLogin();
        else doRegister();
      }
    });
  </script>
</body>
</html>
